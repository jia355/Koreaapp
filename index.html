/* ================================================================
   Utilities
   ================================================================ */
function shuffle(a) {
  const b = [...a];
  for (let i = b.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [b[i], b[j]] = [b[j], b[i]];
  }
  return b;
}

// Build 4 choices for a sentence question
const GLOBAL_ENDINGS = ["아요","어요","이에요","예요","세요","에","으러","러","워요","었어요","고 싶어요","는","은","다","요","여요"];
function buildSentChoices(correct, allAnswers) {
  const pool = [...new Set(allAnswers.filter(a => a !== correct))];
  let wrong = shuffle(pool).slice(0, 3);
  if (wrong.length < 3) {
    const extra = shuffle(GLOBAL_ENDINGS.filter(e => e !== correct && !wrong.includes(e)));
    wrong = [...wrong, ...extra].slice(0, 3);
  }
  return shuffle([correct, ...wrong]);
}

  return (
    <div className="flex flex-wrap gap-1.5 justify-center">
      {words.map((item, i) => {
        const isParticle = /〔/.test(item.m);
        const isPred = /요$|다$|ㄹ$/.test(item.w) && !isParticle;
        const bg = isParticle ? "bg-orange-100 border-orange-300 text-orange-800"
                 : isPred    ? "bg-purple-100 border-purple-300 text-purple-800"
                             : "bg-sky-100 border-sky-300 text-sky-800";
        return (
          <div key={i} className={`flex flex-col items-center border rounded-lg px-2 py-1 text-center ${bg}`}>
            <span className="font-bold text-sm leading-tight">{item.w}</span>
            <span className="text-xs opacity-80 leading-tight">{item.m}</span>
          </div>
        );
      })}
    </div>
  );
}

/* ================================================================
   StudyView — 文法講義頁面
   ================================================================ */

        <button onClick={onBack} className="text-slate-400 hover:text-slate-600 text-sm">✕ 返回</button>
        <div className="flex-1">
          <span className="font-bold text-slate-700">{lesson.title}</span>
          <span className="text-slate-400 text-sm ml-2">{lesson.subtitle}</span>

          className="text-xs bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 py-1.5 rounded-lg transition-colors">
          🖨️ 列印
        </button>
      </div>

      <div className="max-w-xl mx-auto px-4 py-6 space-y-6">
        {/* 課程標題（列印用） */}

          <div className="text-2xl font-black">{lesson.title} {lesson.subtitle}</div>

        {(lesson.grammar || []).map((g, gi) => (

              <div className="flex items-center gap-2">

            <div className="p-5 space-y-4">

              <p className="text-slate-600 text-sm leading-relaxed">{g.exp}</p>

              {g.rules && g.rules.length > 0 && (
                <div className="bg-amber-50 rounded-xl px-4 py-3 space-y-1">

                      <span>{r}</span>

                  ))}

              {/* 例句 */}
              <div className="space-y-4">
                {g.ex.map((e, ei) => (

                    <div className="text-sm text-slate-500">{e.c}</div>
                    {e.w && e.w.length > 0 && <WordByWord words={e.w} />}

        {/* 前往練習按鈕 */}

          <button onClick={() => onQuiz("vocab")}

            📝 單字測驗
          </button>
          <button onClick={() => onQuiz("sentence")}

            ✏️ 句子填空

/* ================================================================
   App
   ================================================================ */
function App() {
  const [view, setView] = React.useState("home");
  const [lesson, setLesson] = React.useState(null);
  const [mode, setMode] = React.useState(null);
  const [questions, setQuestions] = React.useState([]);
  const [idx, setIdx] = React.useState(0);
  const [score, setScore] = React.useState(0);
  const [chosen, setChosen] = React.useState(null); // chosen answer string

  const startQuiz = (l, m) => {
    setLesson(l); setMode(m);
    const allAnswers = l.sentences.map(s => s.answer);
    let qs;
    if (m === "vocab") {
      qs = shuffle(l.vocab).map(item => {
        const wrong = shuffle(l.vocab.filter(v => v.korean !== item.korean)).slice(0, 3);
        return { type:"vocab", prompt: item.chinese, answer: item.korean, ex: item.ex, choices: shuffle([item, ...wrong]) };
      });
    } else {
      qs = shuffle(l.sentences).map(s => ({
        type:"sentence", ...s, choices: buildSentChoices(s.answer, allAnswers)
      }));
    }
    setQuestions(qs); setIdx(0); setScore(0); setChosen(null);
    setView("quiz");
  };

  const startStudy = (l) => { setLesson(l); setView("study"); };

  const handleChoose = (ans) => {
    if (chosen !== null) return;
    setChosen(ans);
    if (ans === questions[idx].answer) setScore(s => s + 1);
  };

  const handleNext = () => {
    if (idx + 1 >= questions.length) { setView("result"); }
    else { setIdx(i => i + 1); setChosen(null); }
  };

  if (view === "home") return <HomeView onSelect={(l,m) => startQuiz(l,m)} onStudy={startStudy} />;
  if (view === "study") return (
    <StudyView
      lesson={lesson}
      onBack={() => setView("home")}
      onQuiz={(m) => startQuiz(lesson, m)}
    />
  );
  if (view === "quiz") return (
    <QuizView
      lesson={lesson} questions={questions} idx={idx} score={score}
      chosen={chosen} onChoose={handleChoose} onNext={handleNext}
      onBack={() => { setView("home"); setChosen(null); }}
    />
  );
  if (view === "result") return (
    <ResultView
      lesson={lesson} mode={mode} score={score} total={questions.length}
      onRetry={() => startQuiz(lesson, mode)}
      onHome={() => setView("home")}
    />
  );
}

/* ================================================================
   HomeView — 課程卡片列表
   ================================================================ */
function HomeView({ onSelect, onStudy }) {
  const [activeModes, setActiveModes] = React.useState({});
  const toggle = (id) => setActiveModes(p => ({ ...p, [id]: p[id] === "vocab" ? "sentence" : p[id] === "sentence" ? null : "vocab" }));

  const totalVocab = LESSONS.reduce((a,l) => a + l.vocab.length, 0);
  const totalSent  = LESSONS.reduce((a,l) => a + l.sentences.length, 0);

  return (
    <div className="min-h-screen bg-slate-50">
      <div className="max-w-xl mx-auto px-4 py-8">
        {/* Header */}
        <div className="text-center mb-8">
          <div className="text-4xl font-black text-slate-800 tracking-tight">한국어 연습</div>
          <div className="text-slate-400 mt-1 text-sm">選擇課程，開始練習</div>
          <div className="flex justify-center gap-4 mt-3 text-xs text-slate-400">
            <span>📚 {LESSONS.length} 課</span>
            <span>🔤 {totalVocab} 個單字</span>
            <span>✏️ {totalSent} 個句子</span>
          </div>
        </div>

        <div className="space-y-3">
          {LESSONS.map(l => (
            <div key={l.id} className="bg-white rounded-2xl shadow-sm overflow-hidden border border-slate-100">
              <div className={`bg-gradient-to-r ${l.color} p-4 text-white`}>
                <div className="flex items-center justify-between">
                  <div>
                    <div className="font-bold text-lg leading-tight">{l.title}</div>
                    <div className="text-sm opacity-90">{l.subtitle}</div>
                    <div className="text-xs opacity-70 mt-0.5">{l.desc}</div>
                  </div>
                  <div className="text-xs opacity-80 text-right">
                    <div className="bg-white/20 rounded-lg px-2 py-0.5 mb-1">단어 {l.vocab.length}</div>
                    <div className="bg-white/20 rounded-lg px-2 py-0.5">문장 {l.sentences.length}</div>
                  </div>
                </div>
              </div>
              <div className="p-3 flex gap-2">
                <button
                  onClick={() => onStudy(l)}
                  className="flex-1 bg-indigo-50 hover:bg-indigo-100 text-indigo-600 font-semibold text-sm rounded-xl py-2 transition-colors"
                >
                  📖 學習
                </button>
                <button
                  onClick={() => onSelect(l, "vocab")}
                  className="flex-1 bg-slate-100 hover:bg-blue-50 hover:text-blue-600 text-slate-600 font-semibold text-sm rounded-xl py-2 transition-colors"
                >
                  📝 單字
                </button>
                <button
                  onClick={() => onSelect(l, "sentence")}
                  className="flex-1 bg-slate-100 hover:bg-purple-50 hover:text-purple-600 text-slate-600 font-semibold text-sm rounded-xl py-2 transition-colors"
                >
                  ✏️ 句子
                </button>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ================================================================
   QuizView
   ================================================================ */
function QuizView({ lesson, questions, idx, score, chosen, onChoose, onNext, onBack }) {
  const q = questions[idx];
  const isCorrect = chosen === q.answer;
  const pct = ((idx) / questions.length) * 100;

  // Explanation content
  let explainTitle = "";
  let explainBody = null;
  if (chosen !== null) {
    if (q.type === "vocab") {
      // Find the vocab item for the correct answer
      const item = lesson.vocab.find(v => v.korean === q.answer);
      explainTitle = `${q.answer} ＝ ${q.prompt}`;
      explainBody = item?.ex ? (
        <div>
          <div className="text-xs text-slate-400 mb-1">例句</div>
          <div className="text-slate-700 font-medium">{item.ex.split(" / ")[0]}</div>
          <div className="text-slate-500 text-sm">{item.ex.split(" / ")[1]}</div>
        </div>
      ) : null;
    } else {
      const completed = q.sentence.replace("___", `[${q.answer}]`);
      explainTitle = completed;
      explainBody = (
        <div className="space-y-1">
          <div><span className="text-xs text-slate-400">翻譯　</span><span className="text-slate-700">{q.translation}</span></div>
          <div><span className="text-xs text-slate-400">文法　</span><span className="text-slate-600 text-sm">{q.hint}</span></div>
        </div>
      );
    }
  }

  return (
    <div className="min-h-screen bg-slate-50 flex flex-col">
      {/* Top bar */}
      <div className="bg-white border-b border-slate-100 px-4 py-3 flex items-center gap-3">
        <button onClick={onBack} className="text-slate-400 hover:text-slate-600 text-sm">✕</button>
        <div className="flex-1">
          <div className="w-full bg-slate-100 rounded-full h-2">
            <div className="h-2 rounded-full bg-gradient-to-r from-blue-400 to-purple-500 transition-all duration-400"
              style={{ width: `${pct}%` }} />
          </div>
        </div>
        <div className="text-slate-500 text-sm font-medium whitespace-nowrap">{idx+1}/{questions.length}</div>
      </div>

      <div className="flex-1 flex flex-col max-w-lg mx-auto w-full px-4 py-6 gap-4">
        {/* Score chip */}
        <div className="flex justify-between items-center text-sm">
          <span className="text-slate-400">{lesson.title} · {q.type === "vocab" ? "單字" : "句子"}</span>
          <span className="bg-white border border-slate-200 rounded-full px-3 py-0.5 text-slate-600 font-semibold">
            ⭐ {score} 分
          </span>
        </div>

        {/* Question card */}
        <div className="bg-white rounded-3xl shadow-sm p-6 fade-up" key={idx}>
          {q.type === "vocab" ? (
            <div className="text-center">
              <div className="text-xs text-slate-400 mb-2 uppercase tracking-widest">中文 → 韓文</div>
              <div className="text-5xl font-black text-slate-800 mb-1">{q.prompt}</div>
            </div>
          ) : (
            <div className="text-center">
              <div className="text-xs text-slate-400 mb-3 uppercase tracking-widest">選出正確的填空</div>
              <div className="text-xl font-bold text-slate-800 leading-relaxed">
                {q.sentence.split("___").map((part, i, arr) => (
                  <span key={i}>
                    {part}
                    {i < arr.length - 1 && (
                      <span className={`inline-block border-b-2 min-w-[3rem] mx-1 font-mono text-base transition-colors ${
                        chosen ? (isCorrect ? "border-green-400 text-green-600" : "border-red-400 text-red-500") : "border-blue-300 text-transparent"
                      }`}>
                        {chosen ? q.answer : "　　"}
                      </span>
                    )}
                  </span>
                ))}
              </div>
              <div className="mt-3 text-sm text-slate-400 bg-slate-50 rounded-lg px-3 py-1.5 inline-block">
                {q.translation}
              </div>
            </div>
          )}
        </div>

        {/* Choices */}
        <div className="grid grid-cols-2 gap-3">
          {q.choices.map((c, i) => {
            const val = q.type === "vocab" ? c.korean : c;
            const label = q.type === "vocab" ? c.korean : c;
            let cls = "bg-white border-2 border-slate-200 text-slate-700 hover:border-blue-300 hover:bg-blue-50";
            if (chosen !== null) {
              if (val === q.answer) cls = "bg-green-50 border-2 border-green-400 text-green-700 font-bold";
              else if (val === chosen) cls = "bg-red-50 border-2 border-red-400 text-red-600";
              else cls = "bg-slate-50 border-2 border-slate-100 text-slate-400";
            }
            return (
              <button key={i} onClick={() => onChoose(val)}
                className={`rounded-2xl py-4 text-lg font-bold transition-all btn-pop ${cls}`}>
                {label}
              </button>
            );
          })}
        </div>

        {/* Explanation panel */}
        {chosen !== null && (
          <div className={`rounded-2xl p-4 fade-up ${isCorrect ? "bg-green-50 border border-green-200" : "bg-red-50 border border-red-200"}`}>
            <div className={`font-bold mb-2 ${isCorrect ? "text-green-700" : "text-red-600"}`}>
              {isCorrect ? "✓ 正確！" : "✗ 答錯了"}
            </div>
            <div className={`text-sm font-semibold mb-2 ${isCorrect ? "text-green-800" : "text-slate-700"}`}>
              {explainTitle}
            </div>
            {explainBody && <div className="text-sm">{explainBody}</div>}
          </div>
        )}

        {/* Next button */}
        {chosen !== null && (
          <button onClick={onNext}
            className="w-full bg-gradient-to-r from-blue-500 to-purple-500 text-white font-bold rounded-2xl py-4 text-lg shadow hover:shadow-lg transition-all btn-pop fade-up">
            {idx + 1 >= questions.length ? "查看結果 →" : "下一題 →"}
          </button>
        )}
      </div>
    </div>
  );
}

/* ================================================================
   ResultView
   ================================================================ */
function ResultView({ lesson, mode, score, total, onRetry, onHome }) {
  const pct = Math.round(score / total * 100);
  const emoji = pct===100?"🎉":pct>=80?"😊":pct>=60?"🙂":"💪";
  const msg   = pct===100?"完美！全對！":pct>=80?"很棒！繼續加油！":pct>=60?"不錯，再練一次！":"화이팅！繼續努力！";
  return (
    <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center px-4 py-8">
      <div className="max-w-sm w-full text-center fade-up">
        <div className="text-6xl mb-4">{emoji}</div>
        <div className="text-2xl font-black text-slate-800 mb-1">{msg}</div>
        <div className="text-slate-400 text-sm mb-8">{lesson.title} · {mode==="vocab"?"單字測驗":"句子填空"}</div>
        <div className="bg-white rounded-3xl shadow-sm p-8 mb-6">
          <div className="text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-500 to-purple-500 mb-1">{pct}%</div>
          <div className="text-slate-400">{score} / {total} 題正確</div>
          <div className="mt-5 w-full bg-slate-100 rounded-full h-3">
            <div className="h-3 rounded-full bg-gradient-to-r from-blue-400 to-purple-500 transition-all"
              style={{width:`${pct}%`}} />
          </div>
        </div>
        <div className="space-y-3">
          <button onClick={onRetry}
            className="w-full bg-gradient-to-r from-blue-500 to-purple-500 text-white font-bold rounded-2xl py-3 shadow hover:shadow-md transition-all btn-pop">
            再練一次
          </button>
          <button onClick={onHome}
            className="w-full bg-white border-2 border-slate-200 text-slate-600 font-bold rounded-2xl py-3 hover:border-blue-200 transition-all">
            ← 返回課程列表
          </button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
